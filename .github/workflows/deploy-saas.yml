name: deploy-saas

# Phase 8b — collapses the Phase 9 ops cutover to a single GHA run.
#
# Trigger: a release.yml run published a GitHub Release. Auto-fires on
# release-published; manual dispatch supports breakglass re-run against
# any existing release tag.
#
# Required repo secrets (Settings → Secrets → Actions):
#   NETCUP_SSH_HOST   FQDN or IP of the SaaS box (statnive.live)
#   NETCUP_SSH_USER   non-root deploy user (e.g. `deploy`) with
#                     NOPASSWD sudoers for /usr/local/bin/statnive-deploy
#                     and write access to /opt/statnive-bundles/incoming/
#   NETCUP_SSH_KEY    OpenSSH private key authorised for that user
#   NETCUP_SSH_KNOWN_HOSTS   `ssh-keyscan -t ed25519 <host>` output
#                     (pin the host key to defeat MITM on first run)
#
# Required prep on the box (one-time, runbook-driven):
#   /etc/statnive/release-key.pub          OpenSSH Ed25519 pubkey
#                                          (the matching pubkey for
#                                          STATNIVE_RELEASE_PRIVKEY)
#   /usr/local/bin/statnive-deploy         from deploy/statnive-deploy.sh
#   /opt/statnive-bundles/incoming/        owner=deploy:statnive-deploy
#   sudoers: deploy ALL=(root) NOPASSWD: /usr/local/bin/statnive-deploy *

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v0.10.0). Leave blank to deploy the latest release.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-saas
  cancel-in-progress: false   # never cancel an in-flight deploy

# Forward-compat with GitHub's June 2026 forced Node-24 default — opts every
# JavaScript action into the Node 24 runtime now. Drop when all referenced
# action SHAs ship native node24-pinned action.yml manifests.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: ship to Netcup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for the verify script + about-probe)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Resolve target version
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            VERSION="$RELEASE_TAG"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(gh release view --json tagName -q .tagName)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Resolve the tag to a commit SHA so post-deploy /api/about can verify.
          SHA="$(git rev-parse "$VERSION^{commit}" 2>/dev/null || gh api "/repos/${REPO}/git/ref/tags/$VERSION" -q .object.sha)"
          # Short form matches `git rev-parse --short HEAD` baked into airgap-bundle.sh.
          echo "sha=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Deploying $VERSION (sha=${SHA:0:7})"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          mkdir -p artifacts
          gh release download "$VERSION" --dir artifacts \
            --pattern '*airgap.tar.gz' \
            --pattern 'SHA256SUMS' \
            --pattern 'SHA256SUMS.sig'
          ls -la artifacts

      - name: Set up SSH
        env:
          SSH_KEY:   ${{ secrets.NETCUP_SSH_KEY }}
          SSH_HOSTS: ${{ secrets.NETCUP_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY"   > ~/.ssh/id_deploy
          printf '%s\n' "$SSH_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/id_deploy ~/.ssh/known_hosts

      - name: SCP bundle + checksums
        env:
          USER: ${{ secrets.NETCUP_SSH_USER }}
          HOST: ${{ secrets.NETCUP_SSH_HOST }}
        run: |
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            artifacts/*airgap.tar.gz \
            artifacts/SHA256SUMS \
            artifacts/SHA256SUMS.sig \
            "${USER}@${HOST}:/opt/statnive-bundles/incoming/"

      - name: Run on-box deploy
        env:
          USER:    ${{ secrets.NETCUP_SSH_USER }}
          HOST:    ${{ secrets.NETCUP_SSH_HOST }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes "${USER}@${HOST}" \
            sudo /usr/local/bin/statnive-deploy deploy "$VERSION"

      - name: Post-deploy probe (/api/about .git_sha matches tag)
        env:
          ABOUT_URL: ${{ vars.STATNIVE_ABOUT_URL || 'https://app.statnive.live/api/about' }}
          EXPECTED_SHA: ${{ steps.target.outputs.sha }}
        run: |
          # Allow up to 30s for DNS/cache to settle after restart.
          for _ in $(seq 1 30); do
            BODY="$(curl -fsS "$ABOUT_URL" 2>/dev/null || true)"
            ACTUAL_SHA="$(echo "$BODY" | jq -r '.git_sha // empty' 2>/dev/null || true)"
            if [ -n "$ACTUAL_SHA" ]; then
              break
            fi
            sleep 1
          done
          echo "expected_sha=$EXPECTED_SHA"
          echo "actual_sha=$ACTUAL_SHA"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::/api/about .git_sha=$ACTUAL_SHA != expected $EXPECTED_SHA — deploy did not advance, investigate"
            exit 1
          fi

      - name: Production probe (privacy + tracker contract; site_id=9999)
        if: ${{ vars.STATNIVE_PROBE_ENABLED == 'true' }}
        env:
          STATNIVE_PROBE_HOST:       ${{ vars.STATNIVE_PROBE_HOST     || 'https://app.statnive.live' }}
          STATNIVE_PROBE_SITE_ID:    ${{ vars.STATNIVE_PROBE_SITE_ID  || '9999' }}
          STATNIVE_PROBE_HOSTNAME:   ${{ vars.STATNIVE_PROBE_HOSTNAME || 'probe.statnive.live' }}
          STATNIVE_PROBE_SSH:        ${{ secrets.STATNIVE_PROBE_SSH }}
          STATNIVE_METRICS_TOKEN:    ${{ secrets.STATNIVE_METRICS_TOKEN }}
        run: |
          # 10-step probe against the live binary on production hardware
          # — full sequence in scripts/prod-probe.sh. Failure here fails the
          # deploy JOB but does NOT auto-revert: the on-box statnive-deploy
          # rollback is healthz-scoped and already ran (and passed) before this
          # step. A red probe means: investigate, then `statnive-deploy rollback`
          # manually (or rely on the next deploy).
          chmod +x scripts/prod-probe.sh scripts/prod-probe-ch-oracle.sh
          ./scripts/prod-probe.sh

      # OpenAPI contract validation against the LIVE host — public/read endpoints
      # only, never mutating/admin/privacy. Default OFF (set the repo var to
      # enable); when unset this step is skipped and the deploy is unchanged.
      - name: Spec contract proxy-validate (public/read; 0 violations)
        if: ${{ vars.STATNIVE_SPEC_PROXY_ENABLED == 'true' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'
      - name: Run spec proxy-validate
        if: ${{ vars.STATNIVE_SPEC_PROXY_ENABLED == 'true' }}
        env:
          HOST: ${{ vars.STATNIVE_PROBE_HOST || 'https://app.statnive.live' }}
        run: |
          set -euo pipefail
          npm --prefix api ci --no-audit --no-fund
          ( cd api && npx --no-install prism proxy openapi.yaml "$HOST" --errors -p 4011 >/tmp/prism.log 2>&1 & )
          sleep 6
          rc=0
          for p in /healthz /api/about /tracker.js /legal/lia /legal/dpa; do
            out="$(curl -s "http://127.0.0.1:4011$p" || true)"
            if echo "$out" | grep -q "errors#VIOLATIONS"; then echo "VIOLATION on $p:"; echo "$out" | head -c 400; rc=1; else echo "ok: $p"; fi
          done
          pkill -f "prism proxy" 2>/dev/null || true
          exit $rc

      - name: Cleanup SSH artifacts
        if: always()
        run: rm -rf ~/.ssh
