name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    name: build + test + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history so golangci-lint --new-from-rev=origin/main can
          # diff against the merge base. Default depth=1 leaves no merge
          # base for the lint baseline check.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false  # vendor/ checked in; cache adds noise

      - name: Vendor check
        run: make vendor-check

      - name: Build (offline-capable, vendored)
        run: make build

      - name: Unit tests
        run: make test

      - name: Tenancy gate (Architecture Rules 1 + 8)
        run: make tenancy-grep

      - name: Skill-content sanitizer (Phase 7d F6)
        run: make skill-sanitizer

      # Phase 7d cleared the 185-finding baseline; lint now runs against
      # the full repo, not just the PR delta.
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8
        with:
          version: v2.5.0
          args: --timeout=5m

  licenses:
    name: license check (no AGPL / strong-copyleft)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # go-licenses needs to inspect module metadata which it cannot do under
    # -mod=vendor (auto-enabled because vendor/ exists). Override per-job
    # so the rest of the toolchain still uses the vendored tree.
    env:
      GOFLAGS: -mod=mod
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e  # v1.6.0

      # ./internal/... + ./cmd/... covers every package in our binary
      # without tripping on the test-helper subpackages (audittest,
      # storagetest) which intentionally have no LICENSE file (they're
      # our own code; the project LICENSE at the repo root applies).
      - name: Check licenses (PLAN.md License Rules)
        run: go-licenses check ./internal/... ./cmd/... --disallowed_types=forbidden,restricted --ignore github.com/statnive/statnive.live

  wal-killtest-smoke:
    name: WAL durability — kill-9 5-iter smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false

      # vendor/ is partially gitignored (large binary blobs from
      # tidwall/wal + medama-io/go-useragent data files are pulled by
      # `go mod vendor` rather than committed). build-test-lint runs
      # vendor-check first; we need the same here for `make build`.
      - name: Vendor check
        run: make vendor-check

      # The kill-9 harness (.claude/skills/wal-durability-review/test/kill9/harness.sh)
      # uses `docker compose up -d clickhouse` + `docker exec` against the
      # configured container name. Boot it here so the harness picks up
      # the running container instead of trying to compose-up itself
      # (which works on the GHA runner but is cleaner with explicit step).
      - name: Boot ClickHouse via docker-compose
        run: docker compose -f deploy/docker-compose.dev.yml up -d clickhouse

      - name: Build binary
        run: make build

      - name: Run kill-9 smoke (5 iterations, ~1 min)
        run: make wal-killtest

      - name: Tear down ClickHouse
        if: always()
        run: docker compose -f deploy/docker-compose.dev.yml down -v

  integration-tests:
    name: Integration tests (docker-compose ClickHouse)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false

      # Node is required because make test-integration depends on make
      # web-build: integration-tagged tests compile internal/dashboard/spa
      # which //go:embed all:dist/*, so dist/ must exist before go test.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Vendor check
        run: make vendor-check

      - name: Boot ClickHouse via docker-compose
        run: docker compose -f deploy/docker-compose.dev.yml up -d clickhouse

      # Wait until CH actually accepts queries before running the suite.
      # `up -d` returns when the container starts, not when CH is ready.
      - name: Wait for ClickHouse ready
        run: |
          for i in $(seq 1 30); do
            if docker exec statnive-clickhouse-dev clickhouse-client --port 9000 -q "SELECT 1" >/dev/null 2>&1; then
              echo "ClickHouse ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse never came up" >&2
          docker logs statnive-clickhouse-dev || true
          exit 1

      - name: Run integration suite
        run: make test-integration

      - name: Tear down ClickHouse
        if: always()
        run: docker compose -f deploy/docker-compose.dev.yml down -v

  tracker-vitest:
    name: Tracker Vitest (payload-golden contract)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tracker/package-lock.json'

      - name: Install tracker devDeps
        run: npm --prefix tracker ci

      # Vitest covers the payload-golden contract; the Go integration
      # test in the integration-tests job replays the same fixture
      # against the full pipeline → ClickHouse stack.
      - name: Run Vitest
        run: npm --prefix tracker test

  dashboard-vitest:
    name: Dashboard SPA (Vitest + lint + bundle-gate + web-airgap-grep)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install SPA devDeps
        run: npm --prefix web ci

      # Unit tests — tokens.test.ts (brand regression), api-client.test.ts
      # (bearer + site_id wiring), Overview.test.tsx (2-tier KPI render +
      # Conversion% computation).
      - name: Run Vitest
        run: npm --prefix web test

      - name: Lint
        run: npm --prefix web run lint

      # Build + size-limit — fails the job if bundle exceeds 10 KB JS gz
      # or 3 KB CSS gz (tightens to 5 KB CSS when uPlot lands in 5b).
      - name: Build SPA
        run: npm --prefix web run build

      - name: Bundle gate
        run: npm --prefix web run bundle-gate

      # brand-grep rejects hand-rolled hex outside tokens.css;
      # web-airgap-grep scans the built bundle for CDN URLs that could
      # violate the air-gap invariant at runtime.
      - name: brand-grep
        run: make brand-grep

      - name: web-airgap-grep
        run: make web-airgap-grep

  smoke-test:
    name: End-to-end boot smoke (real main.go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false

      # make smoke -> make build -> make web-build, which pulls the SPA
      # devDeps and runs Vite. Node 20 mirrors the other frontend jobs;
      # without it `make build` fails before the smoke harness runs.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Vendor check
        run: make vendor-check

      # Reuse the same dev-compose CH container that integration-tests
      # and wal-killtest-smoke drive — single source of truth, single
      # image, single port (deploy/docker-compose.dev.yml).
      - name: Boot ClickHouse via docker-compose
        run: docker compose -f deploy/docker-compose.dev.yml up -d clickhouse

      - name: Wait for ClickHouse ready
        run: |
          for i in $(seq 1 30); do
            if docker exec statnive-clickhouse-dev clickhouse-client --port 9000 -q "SELECT 1" >/dev/null 2>&1; then
              echo "ClickHouse ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse never came up" >&2
          docker logs statnive-clickhouse-dev || true
          exit 1

      # Harness probes /healthz, /tracker.js, /app/, /app/assets/*.js,
      # POST /api/event × 10 with count-back, and /api/stats/overview
      # bearer-auth. `make smoke` depends on `make build` so the real
      # binary (with fresh SPA embedded) is always what gets probed.
      - name: Run smoke harness
        run: make smoke

      - name: Tear down ClickHouse
        if: always()
        run: docker compose -f deploy/docker-compose.dev.yml down -v

  dashboard-e2e:
    name: Dashboard e2e (Playwright + docker-compose CH)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: false

      # make build chains into make web-build (Vite) so the SPA dist
      # embedded in bin/statnive-live stays in sync with the source tree
      # that Playwright asserts against.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Vendor check
        run: make vendor-check

      - name: Boot ClickHouse via docker-compose
        run: docker compose -f deploy/docker-compose.dev.yml up -d clickhouse

      - name: Wait for ClickHouse ready
        run: |
          for i in $(seq 1 30); do
            if docker exec statnive-clickhouse-dev clickhouse-client --port 9000 -q "SELECT 1" >/dev/null 2>&1; then
              echo "ClickHouse ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse never came up" >&2
          docker logs statnive-clickhouse-dev || true
          exit 1

      - name: Build binary
        run: make build

      - name: Install SPA devDeps
        run: npm --prefix web ci

      # Extract just the Playwright version so an unrelated dep bump
      # (e.g. ESLint) doesn't invalidate the 250MB browsers cache. ~90s
      # saved per run on hit.
      - name: Get Playwright version
        id: pw-version
        working-directory: web
        run: |
          V=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      # --with-deps pulls Linux libs Chromium needs (fontconfig, libnss3,
      # etc.) which runner images don't include by default.
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # e2e globalSetup boots the binary, seeds CH, then runs 25 tests
      # across auth / panels / navigation / filters / realtime / multitenant.
      # CH-oracle correlation queries are the Tier-1 acceptance signal.
      - name: Run Playwright e2e
        run: npm --prefix web run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Tear down ClickHouse
        if: always()
        run: docker compose -f deploy/docker-compose.dev.yml down -v
