# statnive-live default config. Overridable via env (STATNIVE_<SECTION>_<KEY>).
# Reference: PLAN.md:150 (Phase 0 default config) + CLAUDE.md invariants.
# Hot reload via fsnotify (viper) is wired in main.go; SIGHUP is the manual fallback.

server:
  listen: "127.0.0.1:8080"
  read_timeout: "5s"
  write_timeout: "5s"

clickhouse:
  addr: "127.0.0.1:9000"
  database: "statnive"
  username: "default"
  password: ""
  cluster: ""               # empty = single-node MergeTree; cluster name flips to ReplicatedMergeTree (PLAN.md:738)

ingest:
  wal_dir: "./wal"
  wal_max_bytes: 10737418240   # 10 GB cap (PLAN.md:159)
  batch_rows: 1000             # dual-trigger batch (PLAN.md:158, doc 24 §Sec 1.5)
  batch_interval: "500ms"
  batch_max_bytes: 10485760    # 10 MB

  # Per-visitor cap. Doc 24 §Sec 5 T2 #15 — protects against scraper
  # networks and runaway trackers. 500/min ≈ 8 PVs/sec sustained per
  # visitor, well above any human-clicker rate. Set to 0 to disable.
  max_pageviews_per_minute_per_visitor: 500

license:
  required: false             # dogfood / dev — no license enforcement
  phone_home: false           # MUST stay false in v1 (Air-Gap invariant, PLAN.md:471)

audit:
  sink: "file"                # file-only in v1 (PLAN.md:474); syslog/Telegram = v1.1
  path: "./audit.jsonl"       # JSONL append-only; SIGHUP triggers reopen for logrotate

tls:
  # When both empty the binary serves HTTP (dev convenience). Production
  # MUST set both — partial config (one set, one empty) is rejected at
  # boot. Reload on SIGHUP per CLAUDE.md / PLAN.md:172. No autocert.
  cert_file: ""
  key_file: ""

ratelimit:
  # /api/event + /api/stats/* hot paths. Keyed per client IP via the
  # same NAT-aware ladder the handler uses (True-Client-IP →
  # CF-Connecting-IP → X-Real-IP → rightmost X-Forwarded-For).
  # /healthz is exempt.
  requests_per_minute: 6000   # 100 req/s steady state

dashboard:
  # Pre-shared bearer token for /api/stats/* and /api/realtime/visitors.
  # Empty = open (dev/local only). Production deployments MUST set a
  # token via env (STATNIVE_DASHBOARD_BEARER_TOKEN=...) until Phase 2b
  # ships full bcrypt + sessions + RBAC. Compared with constant-time
  # equality to avoid timing leaks.
  bearer_token: ""
