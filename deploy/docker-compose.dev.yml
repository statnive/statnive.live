# Local-dev ClickHouse — single node, localhost-bound (PLAN.md verification 8 +
# Security feature #2). Use `docker compose -f deploy/docker-compose.dev.yml up -d clickhouse`.
# Production deploys via deploy/airgap-install.sh + native ClickHouse package
# under systemd; this file is dev-only.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: statnive-clickhouse-dev
    ports:
      # 127.0.0.1 prefix is load-bearing — never bind 0.0.0.0 even in dev.
      # Host port 19000 avoids clashing with other ClickHouse / MinIO instances
      # that often run on 9000; container still uses 9000 internally.
      - "127.0.0.1:19000:9000"  # native protocol (clickhouse-go)
      - "127.0.0.1:18123:8123"  # HTTP (clickhouse-client / Altinity MCP)
    volumes:
      # Named volumes (not bind mounts) — keeps CH's data files outside the
      # project tree so `go mod vendor` and `go test ./...` don't try to
      # walk into them.
      - statnive_ch_data:/var/lib/clickhouse
      - statnive_ch_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: statnive
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  statnive_ch_data:
  statnive_ch_logs:
