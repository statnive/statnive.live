rules:
  - id: dashboard-site-query-needs-authz
    languages: [go]
    severity: ERROR
    paths:
      include:
        - "internal/dashboard/**/*.go"
      exclude:
        - "internal/dashboard/filter.go"   # the choke-point that already authz-checks
        - "**/*_test.go"
        - "vendor/**"
    message: |
      Dashboard handler reads ?site / ?site_id directly from the request
      URL without routing through filterFromRequest (the per-site
      choke-point) or auth.User.CanAccessSite.

      This is the OWASP A01:2021 Broken Access Control class — a logged-in
      user with a grant on site A could read site B's data by swapping
      ?site=A to ?site=B. Lesson 35 in LEARN.md.

      Fix: pass the raw value through resolveAuthorizedSiteID(r, raw) in
      filter.go (which routes through ActiveSiteIDFromContext + actor
      grant check), or call filterFromRequest(r, deps.Sites) for the
      full Filter parse.
    patterns:
      - pattern-either:
          - pattern: $R.URL.Query().Get("site")
          - pattern: $R.URL.Query().Get("site_id")
      # The raw ?site read is legitimate when it flows into one of the
      # known choke-points. Each `pattern-not-inside` matches when the
      # offending expression appears inside that call's argument list.
      - pattern-not-inside: resolveAuthorizedSiteID(...)
      - pattern-not-inside: filterFromRequest(...)
      - pattern-not-inside: |
          if $ID, $OK := auth.ActiveSiteIDFromContext(...); $OK { ... }
      - pattern-not-inside: |
          if !$A.CanAccessSite(...) { ... }
