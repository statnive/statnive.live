# Semgrep rules for clickhouse-operations-review
#
# Authored per doc 28 §Gap 3 (lines 638–709). Bodies ship here; `.github/workflows/
# ch-ops-gate.yml` registers this file as its semgrep `config:` path.
#
# License: MIT
# Research anchor: jaan-to/docs/research/28-geoip-iranian-dc-clickhouse.md §Gap 3

rules:
  - id: ch-ops-no-optimize-final-in-sql
    languages: [generic]
    paths:
      include: ["migrations/*.sql", "internal/**/*.go"]
      exclude: ["**/*_test.go", "**/testdata/**"]
    pattern-regex: '(?i)OPTIMIZE\s+TABLE\s+[A-Za-z0-9_.`"]+\s+FINAL(?!\s+DEDUPLICATE\s+BY)(?![^\n;]*PARTITION)'
    message: >
      OPTIMIZE FINAL without PARTITION is forbidden. Use
      `OPTIMIZE TABLE t PARTITION 'YYYYMM' FINAL DEDUPLICATE` off-peak,
      or set `min_age_to_force_merge_seconds=3600`.
    severity: ERROR

  - id: ch-ops-async-insert-outside-fallback
    languages: [go, generic]
    paths:
      include: ["internal/**/*.go", "config/**/*.xml", "config/**/*.go"]
      exclude:
        - "internal/ingest/fallback/**"
        - "config/clickhouse/users.d/ingest_fallback.xml"
        - "**/*_test.go"
    pattern-either:
      - pattern-regex: '(?i)async_insert\s*=\s*1'
      - pattern-regex: '(?i)<async_insert>\s*1\s*</async_insert>'
    message: >
      async_insert=1 is safety-valve only; primary writes go through
      WAL + sync INSERT. async_insert_deduplicate=0 default corrupts
      AggregateFunction states on retry.
    severity: ERROR

  - id: ch-ops-hardcoded-clickhouse-path
    languages: [go]
    paths:
      include: ["internal/**/*.go", "cmd/**/*.go"]
      exclude: ["**/*_test.go"]
    pattern-regex: '"/var/lib/clickhouse(?:/[A-Za-z0-9_./-]*)?"'
    message: Hardcoded CH path; read from config.DataDir.
    severity: WARNING

  - id: ch-ops-select-missing-max-execution-time
    languages: [go]
    paths:
      include: ["internal/query/**/*.go", "internal/api/**/*.go"]
      exclude: ["**/*_test.go"]
    patterns:
      - pattern-either:
          - pattern: $DB.QueryContext($CTX, $SQL, ...)
          - pattern: $DB.Query($SQL, ...)
      - pattern-not-regex: '(?i)SETTINGS[^"`)]*max_execution_time'
    message: Customer SELECT must append SETTINGS max_execution_time (≤30s).
    severity: ERROR

  - id: ch-ops-direct-raw-insert-bypasses-wal
    languages: [go]
    paths:
      include: ["internal/**/*.go"]
      exclude:
        - "internal/wal/**"
        - "internal/ingest/fallback/**"
        - "**/*_test.go"
    pattern-regex: '(?is)INSERT\s+INTO\s+(events|rollup_\w+)\b'
    message: >
      Direct INSERT bypasses WAL. All writes must go through
      wal.Write → batcher → sync INSERT.
    severity: ERROR

  - id: ch-ops-prom-missing-parts-ceiling-alert
    languages: [yaml]
    paths:
      include: ["prometheus/*.rules.yml", "monitoring/*.yml"]
    pattern-not-regex: 'ClickHouseAsyncMetrics_NumberOfActiveParts|system\.parts.*active|clickhouse_parts_active'
    message: Missing parts-ceiling alert (warn at 100, critical at 150 per table).
    severity: WARNING

  - id: ch-ops-prom-missing-disk-threshold-alert
    languages: [yaml]
    paths:
      include: ["prometheus/*.rules.yml", "monitoring/*.yml"]
    pattern-not-regex: '(?i)(disk.*(85|0\.85|90|0\.90))|node_filesystem_avail_bytes'
    message: Missing disk-usage alert. Warn 85%, page 90%.
    severity: WARNING

  - id: ch-ops-no-nullable-without-justification
    languages: [generic]
    paths:
      include: ["migrations/*.sql", "migrations/**/*.tmpl"]
    patterns:
      - pattern-regex: 'Nullable\s*\('
      - pattern-not-regex: '--\s*NULLABLE-OK:'
    message: >
      No Nullable columns unless justified with a same-line
      `-- NULLABLE-OK: <reason>` comment.
    severity: ERROR