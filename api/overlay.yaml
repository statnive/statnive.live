# Hand-authored OpenAPI semantics for statnive-live.
#
# This is the ONLY hand-edited contract file. It is a partial OpenAPI 3.1
# document that cmd/specgen deep-merges over the generated route skeleton
# (openapi.gen.yaml) to produce the committed api/openapi.yaml. The skeleton
# supplies every path/method/operationId/tag from the live chi router; this
# file supplies info/servers/tags/security/components and per-operation
# summaries, parameters, request bodies, responses, and real examples.
#
# Reality is documented, not idealised (CLAUDE.md): snake_case JSON; a
# {"error": "..."} envelope (NOT RFC 9457); text/plain on some http.Error
# paths; bare 202/204 on /api/event; Prometheus text on /metrics; HTML on
# /privacy + /legal/*. Internal-only ops are tagged x-internal for a future
# public-docs split.
info:
  title: statnive-live API
  version: "1.0.0"
  description: >-
    Privacy-aware analytics backend. snake_case JSON; errors use a
    `{"error": "..."}` envelope (some endpoints emit text/plain). Dashboard
    stats read hourly/daily rollups with a ~1h delay (Architecture Rule 3),
    so a freshly ingested event does not appear in /api/stats/* immediately.
  contact:
    name: statnive-live
    url: https://app.statnive.live

servers:
  - url: https://app.statnive.live
    description: SaaS
  - url: http://127.0.0.1:8080
    description: Local / self-hosted
  - url: http://127.0.0.1:4010
    description: Prism mock

tags:
  - name: Ingestion
    description: First-party tracker event intake.
  - name: Auth
    description: Dashboard session login/logout + current user.
  - name: Stats
    description: Read-only analytics (rollup-backed; ~1h delay).
  - name: Admin
    description: Operator CRUD (users, goals, sites, options). x-internal.
  - name: McpTokens
    description: Self-serve MCP API-token management.
  - name: Privacy
    description: GDPR DSAR surfaces (opt-out, access, erase, consent).
  - name: Legal
    description: Public legal templates + privacy page.
  - name: Ops
    description: Health, Prometheus metrics, build/attribution.
  - name: Public
    description: Tracker script, landing, favicon.
  - name: OAuth
    description: OAuth 2.1 authorization server (chatgpt_app build). x-internal.
  - name: McpHttp
    description: MCP-over-HTTP transport (separate listener). x-internal.

# Global default: session cookie OR bearer token. Public ops override with
# `security: []`.
security:
  - SessionCookie: []
  - BearerAuth: []

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: statnive_session
      description: Dashboard session cookie (name configurable via auth.session.cookie_name).
    BearerAuth:
      type: http
      scheme: bearer
      description: 'API token; `Authorization: Bearer <token>`.'

  responses:
    Unauthorized:
      description: 'Missing or invalid session/token. Dashboard middleware emits text/plain `unauthorized` with a WWW-Authenticate header; login emits JSON `{"error":"invalid credentials"}`.'
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: 'Authenticated but not permitted (role or cross-tenant). Body is the uniform `{"error":"forbidden"}`.'
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    BadRequest:
      description: Invalid request (validation / malformed filter).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotImplemented:
      description: Endpoint reserved but not built in this deployment (feature-flagged or v1.1/v2). Maps to storage.ErrNotImplemented / errFeatureDisabled.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  parameters:
    SiteParam:
      name: site
      in: query
      required: true
      description: Target site_id.
      schema: { type: integer, format: int64, minimum: 1 }
    FromParam:
      name: from
      in: query
      required: false
      description: Inclusive start date YYYY-MM-DD (site TZ, default Europe/Berlin). Defaults to last 7 days.
      schema: { type: string, format: date }
    ToParam:
      name: to
      in: query
      required: false
      description: Exclusive end date YYYY-MM-DD (site TZ).
      schema: { type: string, format: date }
    ChannelParam:
      name: channel
      in: query
      required: false
      description: Filter to a single channel (e.g. organic_search, direct).
      schema: { type: string }
    LimitParam:
      name: limit
      in: query
      required: false
      schema: { type: integer, format: int64, minimum: 1, maximum: 200 }

  schemas:
    ErrorEnvelope:
      type: object
      description: Standard non-2xx JSON body. 403 bodies are flattened to `"forbidden"`.
      additionalProperties: false
      required: [error]
      properties:
        error: { type: string, example: "internal error" }

    OverviewResult:
      type: object
      required: [pageviews, visitors, goals, revenue, rpv]
      properties:
        pageviews: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0, description: Currency-neutral integer; SPA formats via site currency. }
        rpv: { type: number, format: double, description: Revenue per visitor. }
      example: { pageviews: 15230, visitors: 3450, goals: 120, revenue: 4500, rpv: 1.3043 }

    SourceRow:
      type: object
      required: [referrer_name, channel, views, visitors, goals, revenue, rpv]
      properties:
        referrer_name: { type: string }
        channel: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    SourceChannelRow:
      type: object
      required: [channel, views, visitors, goals, revenue, rpv]
      properties:
        channel: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    SourcesResponse:
      type: object
      required: [rows, by_channel]
      properties:
        rows: { type: array, items: { $ref: "#/components/schemas/SourceRow" } }
        by_channel: { type: array, items: { $ref: "#/components/schemas/SourceChannelRow" } }

    PageRow:
      type: object
      required: [pathname, views, visitors, goals, revenue, rpv]
      properties:
        pathname: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    SEORow:
      type: object
      required: [day, views, visitors, goals, revenue]
      properties:
        day: { type: string, format: date-time }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }

    CampaignRow:
      type: object
      required: [utm_campaign, utm_source, utm_medium, utm_content, utm_term, channel, views, visitors, goals, revenue, rpv]
      properties:
        utm_campaign: { type: string }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_content: { type: string }
        utm_term: { type: string }
        channel: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    DailyPoint:
      type: object
      required: [day, visitors, pageviews, goals, revenue]
      properties:
        day: { type: string, format: date-time }
        visitors: { type: integer, format: int64, minimum: 0 }
        pageviews: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }

    RealtimeResult:
      type: object
      required: [hour_utc, active_visitors, pageviews_last_hr]
      properties:
        hour_utc: { type: string, format: date-time }
        active_visitors: { type: integer, format: int64, minimum: 0 }
        pageviews_last_hr: { type: integer, format: int64, minimum: 0 }

    GeoRow:
      type: object
      required: [country_code, province, city, views, visitors, goals, revenue, rpv]
      properties:
        country_code: { type: string }
        province: { type: string }
        city: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    GeoTopRow:
      type: object
      required: [country_code, views, visitors, goals, revenue, rpv]
      properties:
        country_code: { type: string }
        views: { type: integer, format: int64, minimum: 0 }
        visitors: { type: integer, format: int64, minimum: 0 }
        goals: { type: integer, format: int64, minimum: 0 }
        revenue: { type: integer, format: int64, minimum: 0 }
        rpv: { type: number, format: double }

    GeoResponse:
      type: object
      required: [top, rows]
      properties:
        top: { type: array, items: { $ref: "#/components/schemas/GeoTopRow" } }
        rows: { type: array, items: { $ref: "#/components/schemas/GeoRow" } }

    DeviceRow:
      type: object
      required: [device, browser, os, visitors]
      properties:
        device: { type: string }
        browser: { type: string }
        os: { type: string }
        visitors: { type: integer, format: int64, minimum: 0 }

    FunnelResult:
      type: object
      required: [steps, counts, drop_off_pct]
      properties:
        steps: { type: array, items: { type: string } }
        counts: { type: array, items: { type: integer, format: int64, minimum: 0 } }
        drop_off_pct: { type: array, items: { type: number, format: double } }

    PropNameRow:
      type: object
      required: [name, sample_values, last_seen]
      properties:
        name: { type: string }
        sample_values: { type: array, items: { type: string } }
        last_seen: { type: string, format: date-time }

    VariantRow:
      type: object
      required: [value, visitors, goal_completions, conversion_rate]
      properties:
        value: { type: string }
        visitors: { type: integer, format: int64, minimum: 0 }
        goal_completions: { type: integer, format: int64, minimum: 0 }
        conversion_rate: { type: number, format: double }
        delta_pp: { type: [number, "null"], format: double }
        delta_rel: { type: [number, "null"], format: double }
        p_value: { type: [number, "null"], format: double }
        significant: { type: [boolean, "null"] }
        ci_low: { type: [number, "null"], format: double }
        ci_high: { type: [number, "null"], format: double }

    CompareResult:
      type: object
      required: [dimension, goal, control, variants]
      properties:
        dimension: { type: string }
        goal: { type: string }
        control: { type: string }
        variants: { type: array, items: { $ref: "#/components/schemas/VariantRow" } }

    GoalSummary:
      type: object
      required: [name, pattern]
      properties:
        name: { type: string }
        pattern: { type: string }

    Site:
      type: object
      required: [id, hostname, enabled, tz, currency]
      properties:
        id: { type: integer, format: int64 }
        hostname: { type: string }
        enabled: { type: boolean }
        tz: { type: string }
        currency: { type: string }

    SitesResponse:
      type: object
      required: [sites]
      properties:
        sites: { type: array, items: { $ref: "#/components/schemas/Site" } }

    Role:
      type: string
      enum: [admin, viewer, api]

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
      example: { email: "admin@example.com", password: "correct horse battery staple" }

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          type: object
          required: [user_id, email, role, site_id]
          properties:
            user_id: { type: string }
            email: { type: string }
            role: { $ref: "#/components/schemas/Role" }
            site_id: { type: integer, format: int64 }

    MeResponse:
      type: object
      required: [user_id, email, username, role, site_id, sites]
      properties:
        user_id: { type: string }
        email: { type: string }
        username: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        site_id: { type: integer, format: int64 }
        sites:
          type: object
          additionalProperties: { type: string }
          description: site_id (string) → role.
        demo_banner: { type: string }

    Attribution:
      type: object
      required: [name, license, url, text]
      properties:
        name: { type: string }
        license: { type: string }
        url: { type: string }
        text: { type: string }

    AboutResponse:
      type: object
      required: [version, git_sha, go_version, attributions]
      properties:
        version: { type: string }
        git_sha: { type: string }
        go_version: { type: string }
        attributions: { type: array, items: { $ref: "#/components/schemas/Attribution" } }

    RawEvent:
      type: object
      description: >-
        Tracker payload. Accepted as a single object or an array of objects;
        Content-Type is sniffed, so text/plain (sendBeacon) and
        application/json are both accepted. Server-set fields are never read
        from the client.
      required: [hostname, event_type]
      properties:
        hostname: { type: string }
        pathname: { type: string }
        title: { type: string }
        referrer: { type: string }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_campaign: { type: string }
        utm_content: { type: string }
        utm_term: { type: string }
        viewport_width: { type: integer, minimum: 0, maximum: 65535 }
        event_type: { type: string, enum: [pageview, custom] }
        event_name: { type: string }
        event_value: { type: number, format: double }
        is_goal: { type: boolean }
        user_segment: { type: string }
        props:
          type: object
          additionalProperties: { type: string }
          deprecated: true
          description: Legacy alias merged into hit_props.
        hit_props: { type: object, additionalProperties: { type: string } }
        session_props: { type: object, additionalProperties: { type: string } }
        user_props: { type: object, additionalProperties: { type: string } }
        user_id: { type: string, description: "Customer-supplied; hashed server-side, never stored raw." }
      example:
        hostname: example.com
        pathname: /features
        title: Features
        referrer: https://google.com/search
        utm_source: google
        utm_medium: cpc
        event_type: pageview
        event_name: pageview
        event_value: 0

    MCPToken:
      type: object
      required: [id, name, role, site_ids, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        site_ids: { type: array, items: { type: integer, format: int64 } }
        created_at: { type: string, format: date-time }
        expires_at: { type: integer, format: int64, description: Unix seconds; 0 = never. }
        last_used_at: { type: integer, format: int64, description: Unix seconds; 0 = never. }
        token: { type: string, description: "Raw secret, returned once at mint only." }

    MCPTokensResponse:
      type: object
      required: [tokens]
      properties:
        tokens: { type: array, items: { $ref: "#/components/schemas/MCPToken" } }

    MintTokenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        site_ids: { type: array, items: { type: integer, format: int64 } }
        role: { $ref: "#/components/schemas/Role" }
        ttl_days: { type: integer, format: int64, minimum: 1 }

    MCPConnection:
      type: object
      required: [enabled, transport]
      properties:
        enabled: { type: boolean }
        transport: { type: string }
        url: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        sites: { type: array, items: { type: integer, format: int64 } }
        add_command_template: { type: string }

    AdminUser:
      type: object
      required: [user_id, email, username, role]
      properties:
        user_id: { type: string }
        email: { type: string }
        username: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        site_id: { type: integer, format: int64 }
        disabled: { type: boolean }

    AdminUsersResponse:
      type: object
      required: [users]
      properties:
        users: { type: array, items: { $ref: "#/components/schemas/AdminUser" } }

    AdminGoal:
      type: object
      required: [id, name, match_type, pattern]
      properties:
        id: { type: string }
        name: { type: string }
        match_type: { type: string }
        pattern: { type: string }
        value: { type: integer, format: int64 }
        enabled: { type: boolean }

    AdminGoalsResponse:
      type: object
      required: [goals]
      properties:
        goals: { type: array, items: { $ref: "#/components/schemas/AdminGoal" } }

    AdminSite:
      type: object
      required: [id, hostname, enabled]
      properties:
        id: { type: integer, format: int64 }
        hostname: { type: string }
        slug: { type: string }
        enabled: { type: boolean }
        tz: { type: string }
        currency: { type: string }
        jurisdiction: { type: string }
        consent_mode: { type: string }

    AdminSitesResponse:
      type: object
      required: [sites]
      properties:
        sites: { type: array, items: { $ref: "#/components/schemas/AdminSite" } }

    OptionsResponse:
      type: object
      description: Currencies / timezones option lists for admin forms.
      additionalProperties: true

paths:
  /api/event:
    post:
      summary: Ingest one or more tracker events.
      description: Accepts a single RawEvent or an array. Returns a bare 202 (no body) on accept, 204 for silent drops (prefetch, unknown host, consent-gated).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: "#/components/schemas/RawEvent" }
                - { type: array, items: { $ref: "#/components/schemas/RawEvent" } }
          text/plain:
            schema:
              oneOf:
                - { $ref: "#/components/schemas/RawEvent" }
                - { type: array, items: { $ref: "#/components/schemas/RawEvent" } }
      responses:
        "202": { description: Accepted (no body). }
        "204": { description: Silently dropped (prefetch / unknown host / consent). }
        "400": { description: Malformed body or oversized payload (text/plain). }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { description: WAL sync failure (text/plain). }
    options:
      summary: CORS preflight for /api/event.
      security: []
      responses:
        "204": { description: CORS preflight. }

  /api/login:
    post:
      tags: [Auth]
      summary: Log in; sets the session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          description: 'Invalid credentials (`{"error":"invalid credentials"}`).'
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /api/logout:
    post:
      tags: [Auth]
      summary: Clear the session cookie.
      security: []
      responses:
        "204": { description: Logged out. }

  /api/user:
    get:
      tags: [Auth]
      summary: Current authenticated user.
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/sites:
    get:
      tags: [Stats]
      summary: Sites the actor may view.
      responses:
        "200":
          description: Site list (filtered to actor grants).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SitesResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/stats/overview:
    get:
      tags: [Stats]
      summary: Headline KPIs (rollup-backed, ~1h delay).
      parameters:
        - { $ref: "#/components/parameters/SiteParam" }
        - { $ref: "#/components/parameters/FromParam" }
        - { $ref: "#/components/parameters/ToParam" }
        - { $ref: "#/components/parameters/ChannelParam" }
      responses:
        "200":
          description: Overview metrics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OverviewResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/stats/sources:
    get:
      tags: [Stats]
      summary: Referrer + per-channel breakdown.
      parameters:
        - { $ref: "#/components/parameters/SiteParam" }
        - { $ref: "#/components/parameters/FromParam" }
        - { $ref: "#/components/parameters/ToParam" }
        - { $ref: "#/components/parameters/ChannelParam" }
      responses:
        "200":
          description: Sources.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourcesResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/stats/pages:
    get:
      tags: [Stats]
      summary: Top pages by pathname.
      parameters:
        - { $ref: "#/components/parameters/SiteParam" }
        - { $ref: "#/components/parameters/FromParam" }
        - { $ref: "#/components/parameters/ToParam" }
        - { $ref: "#/components/parameters/ChannelParam" }
      responses:
        "200":
          description: Pages.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PageRow" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/stats/seo:
    get:
      tags: [Stats]
      summary: Organic-search daily trend.
      parameters:
        - { $ref: "#/components/parameters/SiteParam" }
        - { $ref: "#/components/parameters/FromParam" }
        - { $ref: "#/components/parameters/ToParam" }
      responses:
        "200":
          description: SEO trend.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SEORow" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/stats/trend:
    get:
      tags: [Stats]
      summary: All-traffic daily trend.
      parameters:
        - { $ref: "#/components/parameters/SiteParam" }
        - { $ref: "#/components/parameters/FromParam" }
        - { $ref: "#/components/parameters/ToParam" }
        - { $ref: "#/components/parameters/ChannelParam" }
      responses:
        "200":
          description: Trend.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DailyPoint" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
